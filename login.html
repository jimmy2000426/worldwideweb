<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 / 註冊 - Style & Trim</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

    <!-- 頂部簡易導覽列 -->
    <nav class="navbar navbar-dark py-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-scissors me-2"></i>Style & Trim
            </a>
            <a href="index.html" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left"></i> 返回首頁</a>
        </div>
    </nav>

    <!-- 登入/註冊 主要區塊 -->
    <div class="container flex-grow-1 d-flex align-items-center justify-content-center pb-5">
        <div class="row w-100 justify-content-center">
            <div class="col-md-8 col-lg-5">
                
                <div class="auth-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-white mb-2">會員專區</h3>
                        <p class="text-secondary small">登入以管理您的預約紀錄與專屬優惠</p>
                    </div>

                    <!-- 切換標籤 (Tabs) -->
                    <ul class="nav nav-tabs nav-fill mb-4" id="authTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab" aria-controls="login" aria-selected="true">登入</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab" aria-controls="register" aria-selected="false">註冊</button>
                        </li>
                    </ul>

                    <!-- 標籤內容區 (Tab Content) -->
                    <div class="tab-content" id="authTabsContent">
                        
                        <!-- 1. 登入表單 -->
                        <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">電子郵件 / 手機號碼</label>
                                    <input type="text" id="loginAccount" class="form-control" placeholder="輸入 Email 或手機號碼">
                                    <div id="loginAccountError" class="invalid-feedback">請填寫電子郵件或手機號碼!!!</div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">密碼</label>
                                    <input type="password" id="loginPassword" class="form-control" placeholder="輸入您的密碼">
                                    <div id="loginPasswordError" class="invalid-feedback">請填寫密碼!!!</div>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input bg-dark border-secondary" type="checkbox" id="rememberMe">
                                        <label class="form-check-label text-muted small text-color" for="rememberMe">
                                            保持登入
                                        </label>
                                    </div>
                                    <a href="#" class="text-gold text-decoration-none small ">忘記密碼？</a>
                                </div>
                                <button type="button" id="submitLoginBtn" class="btn btn-gold w-100 py-2 mb-3" >登入</button>
                                
                                <div class="position-relative mt-4">
                                    <hr class="border-secondary">
                                    <span class="position-absolute top-50 start-50 translate-middle bg-dark px-2 text-muted small text-color" style="background-color: #1e1e1e !important;">或使用社群帳號登入</span>
                                </div>
                                
                                <div class="d-flex gap-2 mt-4">
                                    <button type="button" class="btn btn-outline-light w-50"><i class="bi bi-google me-2"></i>Google</button>
                                    <button type="button" class="btn btn-outline-light w-50"><i class="bi bi-facebook me-2"></i>Facebook</button>
                                </div>
                            </form>
                        </div>

                        <!-- 2. 註冊表單 -->
                        <div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="register-tab">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">姓名 / 稱呼</label>
                                    <input type="text" id="registerName" class="form-control" placeholder="例如：王小明 或 Alex">
                                    <div id="registerNameError" class="invalid-feedback">請填寫姓名或稱呼!!!</div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">手機號碼 <span class="text-danger">*</span></label>
                                    <input type="tel" id="registerPhone" class="form-control" placeholder="09XX-XXX-XXX (接收預約通知用)">
                                    <div id="registerPhoneError" class="invalid-feedback">請填寫有效的手機號碼!!!</div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">電子郵件</label>
                                    <input type="email" id="registerEmail" class="form-control" placeholder="name@example.com">
                                    <div id="registerEmailError" class="invalid-feedback">請填寫有效的電子郵件!!!</div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">設定密碼</label>
                                    <input type="password" id="registerPassword" class="form-control" placeholder="最少 8 個字元，包含英數字">
                                    <div id="registerPasswordError" class="invalid-feedback">請填寫密碼!!!</div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">確認密碼</label>
                                    <input type="password" id="registerConfirmPassword" class="form-control" placeholder="再次輸入密碼">
                                    <div id="registerConfirmPasswordError" class="invalid-feedback">請確認密碼!!!</div>
                                </div>
                                <div class="form-check mb-4">
                                    <input class="form-check-input bg-dark border-secondary" type="checkbox" id="terms" required>
                                    <label class="form-check-label text-muted small text-color" for="terms">
                                        我已閱讀並同意 <a href="#" class="text-gold text-decoration-none">服務條款</a> 與 <a href="#" class="text-gold text-decoration-none">隱私權政策</a>
                                    </label>
                                </div>
                                <button type="button" id="submitRegisterBtn" class="btn btn-gold w-100 py-2" >建立帳號</button>
                            </form>
                        </div>

                    </div>
                </div>

                <!-- 對應 Use Case Diagram: 管理員入口 -->
                <div class="text-center mt-4">
                    <a href="#" class="text-muted text-decoration-none small" onclick="alert('導向：理髮師 / 管理員專屬後台登入頁面')">
                        <i class="bi bi-shield-lock me-1"></i> 員工後台入口
                    </a>
                </div>

            </div>
        </div>
    </div>
    <script src="js/login.js"></script>
    <script src="js/auth.js"></script>
    <!-- 引入 Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
